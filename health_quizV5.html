<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康系統檢測評估</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F6F1;--ink:#1C2620;--ink-soft:#56625A;--line:#D7DCD2;
  --teal:#0F5C57;--teal-dim:#E3ECE9;--card:#FFFFFF;
  --c1:#0F5C57;--c1-dim:#E1ECEA;
  --c2:#7A5C2E;--c2-dim:#EFE7D8;
  --c3:#5B5184;--c3-dim:#E7E4F0;
  --c4:#B0492E;--c4-dim:#F4E2DC;
  --c5:#2E5F8A;--c5-dim:#DEE8F0;
  --c6:#3D7A4A;--c6-dim:#E1EFE4;
  --low:#2D6A31;--low-dim:#EAF4EB;--low-line:#A5D6A7;
  --mid:#7B5800;--mid-dim:#FFF8E1;--mid-line:#FFD54F;
  --high:#B71C1C;--high-dim:#FFEBEE;--high-line:#EF9A9A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;line-height:1.5;}
.wrap{max-width:760px;margin:0 auto;padding:48px 24px 80px;}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.eyebrow::before{content:"";width:18px;height:1px;background:var(--ink-soft);}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:36px;line-height:1.15;letter-spacing:-0.01em;}
h2{font-family:'Fraunces',serif;font-weight:600;font-size:24px;}
p.lead{color:var(--ink-soft);font-size:15px;margin-top:12px;max-width:56ch;}
.topbar{display:flex;justify-content:space-between;align-items:center;max-width:760px;margin:0 auto;padding:20px 24px 0;}
.brand{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.08em;color:var(--ink-soft);}
.admin-link{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);cursor:pointer;background:none;border:none;border-bottom:1px dotted var(--ink-soft);}
.intro-card{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:36px;margin-top:32px;}
.field{margin-top:18px;}
.field label{font-size:12px;color:var(--ink-soft);display:block;margin-bottom:6px;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;}
.field input,.field textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:3px;font-family:'Inter',sans-serif;font-size:15px;background:#fff;color:var(--ink);}
.field input:focus,.field textarea:focus{outline:2px solid var(--teal);outline-offset:1px;}
.field textarea{resize:vertical;min-height:90px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px;}
@media(max-width:560px){.field-row{grid-template-columns:1fr;}}
.gender-row{display:flex;gap:12px;margin-top:8px;}
.gender-btn{flex:1;padding:14px 12px;border:1.5px solid var(--line);border-radius:4px;background:#fff;cursor:pointer;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink-soft);text-align:center;transition:all .15s;}
.gender-btn:hover{border-color:var(--teal);color:var(--teal);}
.gender-btn.selected{border-color:var(--teal);background:var(--teal-dim);color:var(--teal);font-weight:600;}
.gender-btn .gi{font-size:24px;display:block;margin-bottom:4px;}
button.primary{margin-top:28px;background:var(--teal);color:#fff;border:none;padding:14px 26px;font-size:15px;font-weight:600;border-radius:3px;cursor:pointer;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:8px;}
button.primary:hover{background:#0c4944;}
button.primary:disabled{background:#A9B3AC;cursor:not-allowed;}
button.secondary{margin-top:16px;background:transparent;color:var(--ink);border:1px solid var(--line);padding:12px 22px;font-size:14px;border-radius:3px;cursor:pointer;font-family:'Inter',sans-serif;}
.progress-row{display:flex;align-items:center;gap:14px;margin:36px 0 28px;}
.progress-track{flex:1;height:4px;background:var(--line);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--teal);transition:width .35s ease;}
.progress-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);white-space:nowrap;}
.section-card{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:32px;}
.cat-badge{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:5px 12px;border-radius:20px;margin-bottom:10px;}
.cat-dot{width:7px;height:7px;border-radius:50%;}
.quiz-hint{font-size:13px;color:var(--ink-soft);margin-bottom:18px;padding:8px 12px;background:var(--paper);border-radius:3px;border-left:3px solid var(--line);}
.q-item{display:flex;align-items:flex-start;gap:14px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
.q-item:last-child{border-bottom:none;}
.q-item:hover .q-checkbox{border-color:var(--teal);}
@media(max-width:600px){.q-item{padding:18px 6px;}.q-checkbox{width:24px;height:24px;}.q-text{font-size:15.5px;padding-top:2px;}}
.time-badge{display:inline-flex;align-items:center;gap:6px;background:var(--teal-dim);color:var(--teal);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:5px 12px;border-radius:20px;margin-top:14px;}
.q-checkbox{width:20px;height:20px;border:1.5px solid var(--ink-soft);border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.q-checkbox.checked{background:var(--teal);border-color:var(--teal);}
.q-checkbox svg{display:none;width:13px;height:13px;}
.q-checkbox.checked svg{display:block;}
.q-text{font-size:15px;color:var(--ink);padding-top:1px;}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:28px;}
/* Score overview grid */
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:28px 0;}
@media(max-width:600px){.score-grid{grid-template-columns:repeat(2,1fr);}}
.score-cell{border-radius:4px;padding:14px 10px;text-align:center;border:1px solid var(--line);background:var(--card);}
.score-cell .snum{font-family:'Fraunces',serif;font-size:26px;font-weight:600;}
.score-cell .sname{font-size:11.5px;color:var(--ink-soft);margin-top:3px;line-height:1.3;}
/* Result cards */
.result-card{border:1px solid var(--line);border-radius:12px;margin-bottom:16px;background:var(--card);overflow:hidden;}
.result-card.tier-low{opacity:.82;}
.rc-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:1px solid rgba(0,0,0,.07);}
.rc-head-left{display:flex;align-items:center;gap:12px;}
.rc-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;color:#fff;}
.rc-name{font-family:'Fraunces',serif;font-size:17px;font-weight:600;line-height:1.2;}
.rc-score{font-family:'IBM Plex Mono',monospace;font-size:11px;margin-top:3px;}
.tier-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;white-space:nowrap;}
.rc-body{padding:18px 20px;}
.rc-desc{font-size:14px;line-height:1.75;color:var(--ink);margin-bottom:16px;}
.rc-section-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;}
.test-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.test-pill{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid var(--teal);background:var(--teal-dim);color:var(--teal);}
.tip-cards{display:grid;gap:8px;}
.tip-card{display:flex;gap:12px;align-items:flex-start;padding:10px 13px;background:var(--paper);border-radius:8px;border:1px solid var(--line);}
.tip-icon{font-size:18px;flex-shrink:0;margin-top:2px;}
.tip-title{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;}
.tip-desc{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.6;}
.summary-banner{background:var(--ink);color:#fff;border-radius:4px;padding:26px 28px;margin:28px 0;}
.summary-banner .eyebrow{color:#B8C2BA;}
.summary-banner .eyebrow::before{background:#B8C2BA;}
.summary-banner p{font-size:14.5px;color:#DCE3DD;line-height:1.7;margin-top:8px;}
footer.note{margin-top:36px;font-size:12.5px;color:var(--ink-soft);line-height:1.7;border-top:1px solid var(--line);padding-top:18px;}

.contact-card{background:var(--teal-dim);border:1px solid var(--teal);border-radius:4px;padding:26px 28px;margin-top:26px;}
.contact-card p{font-size:14.5px;color:var(--ink);line-height:1.7;margin-top:6px;}
.contact-actions{margin-top:14px;}
.line-btn{display:inline-flex;align-items:center;gap:8px;background:#06C755;color:#fff;padding:13px 22px;border-radius:3px;font-size:14.5px;font-weight:600;text-decoration:none;}
.line-btn:hover{background:#059944;}
.admin-gate{max-width:420px;margin:80px auto;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:32px;}
table.admin-table{width:100%;border-collapse:collapse;margin-top:20px;font-size:13px;}
table.admin-table th,table.admin-table td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;}
table.admin-table th{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.05em;}
.pill{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:2px 8px;border-radius:10px;margin:2px 3px 2px 0;}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:10px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">健康系統檢測評估 ／ LAB-SCREEN</div>
  <button class="admin-link" id="adminToggle">後台管理</button>
</div>
<div class="wrap" id="hq-quiz-root"></div>
<script>
const ALL_CATEGORIES = {
  hormone_male:{
    key:"hormone_male",name:"賀爾蒙（男性）",color:"c1",

    items:["運動後修復變慢","性慾下降","情緒容易低落或易怒","肌肉量難以提升","體力變差","容易長痘痘","性功能下降（勃起次數、硬度）"],
    rec:{
      low:"賀爾蒙狀態良好，維持規律運動、充足睡眠與均衡飲食，建議每年進行基礎健康檢查。",

    }

  hormone_female:{

    items:["月經週期不規律（時間變短、長）","經期不適感強烈（疼痛、痠痛、頭痛等）","經前、中情緒波動大（易怒、焦慮）","經前或經期睡眠品質不佳","經期前後會長痘痘／粉刺","曾被診斷多囊性卵巢","經期需要靠止痛藥緩解"],
    rec:{
      low:"賀爾蒙狀態良好，維持規律運動、充足睡眠與均衡飲食，建議每年進行基礎健康檢查。",
      mid:"賀爾蒙可能有輕度波動，建議從以下幾個生活面向著手調整，有助改善整體狀況。",

      midTips:["確保充足睡眠：每日維持7–8小時睡眠，有助穩定荷爾蒙分泌節律。","均衡飲食：增加原型食物比例，確保攝取足夠的碳水化合物、蛋白質、健康脂肪與蔬菜等。","學會管理壓力：慢性壓力會干擾內分泌平衡，可嘗試冥想、深呼吸或培養放鬆習慣。"]
    }
  },
  gut:{
    key:"gut",name:"消化道",color:"c2",
    test:"完整腸胃消化功能評估（消化、腸漏症、麩質敏感）（糞便）、急性過敏原40項＋慢性過敏原檢測88項",
    items:["經常脹氣","容易便秘／腹瀉","吃到特定食物容易腸胃不適","排便容易有食物殘渣","排便容易黏馬桶","容易餓也容易飽","經常胃食道逆流"],
    rec:{
      low:"消化道健康狀況良好，保持均衡飲食、作息與補充益生菌，有助維持腸道健康。",

      midTips:["增加膳食纖維：每餐蔬果攝取至少1拳頭以上，有助維持消化道健康。","補充足夠水分：每日飲水量建議體重（kg）× 30-40 mL，有助改善排便狀況。","補充益生菌：可嘗試補充益生菌或多攝取優格、味噌等發酵食品，觀察腸道反應。"]
    }

  stress:{

    rec:{

function splitTip(tip){
  const idx=tip.indexOf("：");
  if(idx===-1) return {title:tip,desc:""};
  return {title:tip.slice(0,idx),desc:tip.slice(idx+1)};
}

function splitTests(str){
  const parts=[];let cur="",depth=0;
  for(const ch of str){
    if(ch==="（"||ch==="(") depth++;
    else if(ch==="）"||ch===")") depth--;
    if(ch==="、"&&depth===0){parts.push(cur.trim());cur="";}
    else cur+=ch;
  }
  if(cur.trim()) parts.push(cur.trim());
  return parts;
}

async function loadAdminData(){
  const el=document.getElementById('adminContent');
  const statsEl=document.getElementById('adminStats');
  el.innerHTML='<div class="empty-state">載入中，請稍候…</div>';
  try{
    const res=await fetch(APPS_SCRIPT_URL);
    const json=await res.json();
    if(json.status!=='success') throw new Error(json.message);
    const rows=(json.rows||[]).sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt));
    window.__adminRows=rows;
    if(statsEl) statsEl.innerHTML=renderAdminStats(rows);
    if(rows.length===0){
      el.innerHTML='<div class="empty-state">目前還沒有任何學員填答紀錄。</div>';
    } else {
      el.innerHTML=renderAdminTable(rows);

  }catch(e){
    console.error(e);
    el.innerHTML='<div class="empty-state">讀取資料時發生錯誤，請稍後再試。</div>';
  }
}

async function deleteRow(id){

  try{

    window.__adminRows = window.__adminRows.filter(r=>r.id!==id);
    const statsEl=document.getElementById('adminStats');
    if(statsEl) statsEl.innerHTML=renderAdminStats(window.__adminRows);
    document.getElementById('adminContent').innerHTML=renderAdminTable(window.__adminRows);
  }catch(e){

function downloadCSV(){
  const rows=window.__adminRows||[];if(rows.length===0)return;
  const catNames=['賀爾蒙','消化道','壓力/睡眠','甲狀腺','慢性疾病','飲食攝取'];
  const header=['姓名','性別','LINE ID','電子信箱','方便聯繫時間','同意被聯繫','填答時間',...catNames.map(n=>n+'分數'),'建議檢測系統','補充說明'];
  const lines=[header.join(',')];
  rows.forEach(r=>{
    const scoreMap={};(r.scores||[]).forEach(s=>{scoreMap[s.key]=s.score;});
    const keys=['hormone_male','hormone_female','gut','stress','thyroid','chronic','diet'];
    const vals=catNames.map((_,i)=>{
      if(i===0) return scoreMap['hormone_male']??scoreMap['hormone_female']??0;
      return scoreMap[keys[i+1]]??0;
    });
    const rec=(r.scores||[]).filter(s=>s.tier==='high').map(s=>s.name).join('；');
    const line=[r.name||'',r.gender==='male'?'男':'女',r.lineId||'',r.email||'',r.contactTime||'',r.consent?'是':'否',new Date(r.submittedAt).toLocaleString('zh-TW'),...vals,rec,r.note||'']
      .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
    lines.push(line);
  });
  const blob=new Blob(["\uFEFF"+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='健康檢測問卷_填答紀錄.csv';a.click();URL.revokeObjectURL(url);
}

async function submitResult(scores){
  const id='submission:'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  const payload={id,name:state.name,lineId:state.lineId,email:state.email,gender:state.gender,note:state.note,contactTime:state.contactTime,consent:state.consent,submittedAt:new Date().toISOString(),
    scores:scores.map(s=>({key:s.key,name:s.name,color:s.color,score:s.score,tier:s.tier}))};
  try{
    const url=APPS_SCRIPT_URL+'?action=save&data='+encodeURIComponent(JSON.stringify(payload));
    await fetch(url);
  }catch(e){
    console.error('儲存失敗',e);
  }
}

function attachHandlers(){
  if(state.view==="intro"){
    function updateStartBtn(){
      const btn=document.getElementById('startBtn');
      const hint=document.getElementById('startHint');
      if(!btn) return;
      const disabled=!state.gender||!state.name.trim()||!canProceed();
      btn.disabled=disabled;
      if(hint){
        if(!state.gender) hint.textContent='請先選擇性別以繼續';
        else if(!state.name.trim()) hint.textContent='請輸入姓名以繼續';
        else if(!canProceed()){
          if(state.email.trim()&&!isValidEmail(state.email)) hint.textContent='電子信箱格式不正確，請重新確認';
          else hint.textContent='請填寫 LINE ID 或正確格式的電子信箱（擇一）';
        } else hint.textContent='';
      }
    }
    document.getElementById('nameInput').addEventListener('input',e=>{state.name=e.target.value;updateStartBtn();});
    document.getElementById('lineInput').addEventListener('input',e=>{state.lineId=e.target.value;updateStartBtn();});
    document.getElementById('emailInput').addEventListener('input',e=>{state.email=e.target.value;updateStartBtn();});
    document.querySelectorAll('.gender-btn').forEach(b=>b.addEventListener('click',()=>{state.gender=b.dataset.gender;render();}));
    const sb=document.getElementById('startBtn');
    if(sb) sb.addEventListener('click',()=>{state.view="quiz";state.step=0;render();});
  }
  else if(state.view==="quiz"){
    document.querySelectorAll('.q-item').forEach(el=>{
      el.addEventListener('click',()=>{const k=el.dataset.cat+":"+el.dataset.idx;state.answers[k]=!state.answers[k];render();});
    });
    const pb=document.getElementById('prevBtn');
    if(pb) pb.addEventListener('click',()=>{if(state.step>0){state.step--;render();}});
    document.getElementById('nextBtn').addEventListener('click',()=>{
      const cats=getCats(state.gender);
      if(state.step<cats.length-1){state.step++;render();}
      else{state.view="extra";render();}
    });
  }
  else if(state.view==="extra"){
    document.getElementById('noteInput').addEventListener('input',e=>{state.note=e.target.value;});
    document.getElementById('contactTimeInput').addEventListener('input',e=>{state.contactTime=e.target.value;});
    document.getElementById('consentRow').addEventListener('click',()=>{state.consent=!state.consent;render();});
    document.getElementById('prevBtn').addEventListener('click',()=>{
      const cats=getCats(state.gender);state.step=cats.length-1;state.view="quiz";render();
    });
    document.getElementById('submitBtn').addEventListener('click',async()=>{
      const scores=computeScores();await submitResult(scores);state.view="result";render();
    });
  }
  else if(state.view==="result"){
    document.getElementById('restartBtn').addEventListener('click',()=>{
      state={view:"intro",name:"",lineId:"",email:"",gender:"",note:"",contactTime:"",consent:false,saveFailed:false,step:0,answers:{},submissionId:null};render();
    });
  }
  else if(state.view==="admin-gate"){
    const tryLogin=()=>{
      if(document.getElementById('pwInput').value===ADMIN_PASSWORD){state.view="admin";render();loadAdminData();}
      else document.getElementById('pwError').style.display='block';
    };
    document.getElementById('pwSubmit').addEventListener('click',tryLogin);
    document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
    document.getElementById('pwCancel').addEventListener('click',()=>{state.view="intro";render();});
  }
  else if(state.view==="admin"){
    document.getElementById('logoutBtn').addEventListener('click',()=>{state.view="intro";render();});
    document.getElementById('exportBtn').addEventListener('click',downloadCSV);
    document.getElementById('adminFilterBtn').addEventListener('click',applyAdminFilter);
    document.getElementById('adminResetBtn').addEventListener('click',()=>{
      document.getElementById('adminSearch').value='';
      document.getElementById('adminDateFrom').value='';
      document.getElementById('adminDateTo').value='';
      const all=window.__adminRows||[];
      const statsEl=document.getElementById('adminStats');
      if(statsEl) statsEl.innerHTML=renderAdminStats(all);
      document.getElementById('adminContent').innerHTML=renderAdminTable(all);
    });
    document.getElementById('adminSearch').addEventListener('keydown',e=>{if(e.key==='Enter') applyAdminFilter();});
  }
}

document.getElementById('adminToggle').addEventListener('click',()=>{
  state.view=(state.view==="admin"||state.view==="admin-gate")?"intro":"admin-gate";render();
});
render();
</script>
</body>
</html>
